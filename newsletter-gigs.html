<!DOCTYPE html>
<html>
<head>
    <title>Newsletter Gig List</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 50px auto; padding: 20px; }
        button { background: #0066cc; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 10px 5px; }
        #output { margin-top: 20px; padding: 20px; background: #f5f5f5; border-radius: 8px; white-space: pre-wrap; font-family: monospace; }
    </style>
</head>
<body>
    <h1>Newsletter Gig List Generator</h1>
    
    <label>Month: <select id="month">
        <option value="2">March 2026</option>
        <option value="3">April 2026</option>
        <option value="4">May 2026</option>
        <option value="5">June 2026</option>
        <option value="6">July 2026</option>
        <option value="7">August 2026</option>
    </select></label>
    
    <button onclick="loadGigs()">Get Gigs</button>
    <button onclick="copyText()">Copy to Clipboard</button>
    
    <div id="output">Click "Get Gigs" to load...</div>
    
    <script>
        const API_KEY = 'AIzaSyDQmO4yLOy8yVjrotQ69f5W5YQGVyiXWNI';
        const CALENDAR_ID = 'bdd10311999@gmail.com';
        
        async function loadGigs() {
            const month = parseInt(document.getElementById('month').value);
            const year = 2026;
            
            const start = new Date(year, month, 1).toISOString();
            const end = new Date(year, month + 1, 0, 23, 59, 59).toISOString();
            
            const url = `https://www.googleapis.com/calendar/v3/calendars/${encodeURIComponent(CALENDAR_ID)}/events?key=${API_KEY}&timeMin=${start}&timeMax=${end}&singleEvents=true&orderBy=startTime`;
            
            document.getElementById('output').textContent = 'Loading...';

            try {
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    document.getElementById('output').textContent = 'Error: ' + data.error.message;
                    return;
                }

                if (!data.items || data.items.length === 0) {
                    document.getElementById('output').textContent = 'No gigs found for that month.';
                    return;
                }

                let text = 'UPCOMING SHOWS:\n\n';
                
                data.items.forEach(event => {
                    const date = new Date(event.start.dateTime || event.start.date);
                    const dateStr = date.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
                    const timeStr = event.start.dateTime ? date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true }) : '';
                    
                    text += dateStr;
                    if (timeStr) text += ' at ' + timeStr;
                    text += ' - ' + event.summary;
                    if (event.location) text += '\n  ' + event.location;
                    text += '\n\n';
                });
                
                document.getElementById('output').textContent = text;
            } catch (err) {
                document.getElementById('output').textContent = 'Network error: ' + err.message;
            }
        }
        
        function copyText() {
            const text = document.getElementById('output').textContent;
            navigator.clipboard.writeText(text);
            alert('Copied to clipboard!');
        }
    </script>
</body>
</html>
